    </div>
  </div>

<script>
// ── DATOS ─────────────────────────────────────────────────────
const GRUPOS = [
  ['A',['MEX','RSA','KOR','CZE']],
  ['B',['CAN','BIH','QAT','SUI']],
  ['C',['BRA','MAR','HAI','SCO']],
  ['D',['USA','PAR','AUS','TUR']],
  ['E',['GER','CUW','CIV','ECU']],
  ['F',['NED','JPN','SWE','TUN']],
  ['G',['BEL','EGY','IRN','NZL']],
  ['H',['ESP','CPV','KSA','URU']],
  ['I',['FRA','SEN','IRQ','NOR']],
  ['J',['ARG','ALG','AUT','JOR']],
  ['K',['POR','COD','UZB','COL']],
  ['L',['ENG','CRO','GHA','PAN']]
];
const NOMBRES = {
  MEX:'México',RSA:'Sudáfrica',KOR:'Corea del Sur',CZE:'Rep. Checa',
  CAN:'Canadá',BIH:'Bosnia y Herz.',QAT:'Catar',SUI:'Suiza',
  BRA:'Brasil',MAR:'Marruecos',HAI:'Haití',SCO:'Escocia',
  USA:'Estados Unidos',PAR:'Paraguay',AUS:'Australia',TUR:'Turquía',
  GER:'Alemania',CUW:'Curazao',CIV:'Costa de Marfil',ECU:'Ecuador',
  NED:'Países Bajos',JPN:'Japón',SWE:'Suecia',TUN:'Túnez',
  BEL:'Bélgica',EGY:'Egipto',IRN:'Irán',NZL:'Nueva Zelanda',
  ESP:'España',CPV:'Cabo Verde',KSA:'Arabia Saudita',URU:'Uruguay',
  FRA:'Francia',SEN:'Senegal',IRQ:'Irak',NOR:'Noruega',
  ARG:'Argentina',ALG:'Argelia',AUT:'Austria',JOR:'Jordania',
  POR:'Portugal',COD:'R.D. Congo',UZB:'Uzbekistán',COL:'Colombia',
  ENG:'Inglaterra',CRO:'Croacia',GHA:'Ghana',PAN:'Panamá'
};

// ── CONSTRUIR PÁGINAS ──────────────────────────────────────────
function buildPages() {
  const P = {};
  P[1]  = { n:1,  t:'fwc',  s:['FWC1','FWC2','FWC3','FWC4'] };
  P[2]  = { n:2,  t:'fwc',  s:['FWC5','FWC6'] };
  P[3]  = { n:3,  t:'fwc',  s:['FWC7','FWC8'] };
  P[4]  = { n:4,  t:'info' };
  P[5]  = { n:5,  t:'info' };
  P[6]  = { n:6,  t:'info' };
  P[7]  = { n:7,  t:'info' };
  P[56] = { n:56, t:'info' };
  P[57] = { n:57, t:'info' };

  let pn = 8;
  for (const [g, paises] of GRUPOS) {
    for (const cod of paises) {
      if (pn === 56) pn = 58;
      P[pn] = { n:pn, t:'pais', cod, g, s: Array.from({length:10},(_,i)=>`${cod}${i+1}`) };
      pn++;
      if (pn === 56) pn = 58;
      P[pn] = { n:pn, t:'pais', cod, g, s: Array.from({length:10},(_,i)=>`${cod}${i+11}`) };
      pn++;
    }
  }

  P[106] = { n:106, t:'fwc', s:['FWC9','FWC10'] };
  P[107] = { n:107, t:'fwc', s:['FWC11','FWC12','FWC13'] };
  P[108] = { n:108, t:'fwc', s:['FWC14','FWC15'] };
  P[109] = { n:109, t:'fwc', s:['FWC16','FWC17','FWC18','FWC19'] };

  return P;
}

function buildSpreads(P) {
  const sp = [];
  const nums = Object.keys(P).map(Number).sort((a,b)=>a-b);
  // pág 1 = sola
  sp.push({ single:true, L:P[1], R:null });
  const rest = nums.filter(n=>n>1);
  let i=0;
  while(i<rest.length){
    const n=rest[i];
    if(n%2===0){
      const nxt=rest[i+1];
      sp.push({ single:false, L:P[n], R:nxt?P[nxt]:null });
      i+=2;
    } else {
      sp.push({ single:false, L:null, R:P[n] });
      i+=1;
    }
  }
  return sp;
}

const PAGES   = buildPages();
const SPREADS = buildSpreads(PAGES);
const ALL_CODES = Object.values(PAGES).flatMap(p=>p.s||[]);

// ── STATE ──────────────────────────────────────────────────────
let album = {};
let spreadIdx = 0;
let saveTimer = null;
const token = localStorage.getItem('gh_token');
const owner = localStorage.getItem('gh_owner');
const repo  = localStorage.getItem('gh_repo');
let currentUser = sessionStorage.getItem('current_user');

// ── INIT ───────────────────────────────────────────────────────
window.onload = async () => {
  if (!token || !currentUser) { window.location.href='login.html'; return; }
  document.getElementById('huser').textContent = currentUser;
  try {
    const saved = await loadJSON(`album_${currentUser}.json`);
    album = saved || {};
  } catch(e) { album = {}; }
  render();
  updateStats();
};

function logout() {
  sessionStorage.removeItem('current_user');
  window.location.href = 'login.html';
}

// ── GITHUB API ─────────────────────────────────────────────────
async function loadJSON(file) {
  const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file}`,
    { headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json'} });
  if (r.status===404) return null;
  if (!r.ok) throw new Error(r.status);
  const d = await r.json();
  return JSON.parse(atob(d.content.replace(/\n/g,'')));
}

async function saveJSON(file, obj) {
  const url = `https://api.github.com/repos/${owner}/${repo}/contents/${file}`;
  const ex = await fetch(url,{headers:{'Authorization':`token ${token}`}});
  const sha = ex.ok ? (await ex.json()).sha : undefined;
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(obj,null,2))));
  await fetch(url,{
    method:'PUT',
    headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},
    body:JSON.stringify({message:`Actualizar ${file}`,content,...(sha?{sha}:{})})
  });
}

// ── STICKER CLICK ──────────────────────────────────────────────
function clickSticker(code,e) {
  e && e.stopPropagation();
  const v = album[code]||0;
  album[code] = v===0?1:v+1;
  refreshSticker(code);
  updateStats();
  scheduleSave();
}
function rightClick(code,e) {
  e.preventDefault(); e.stopPropagation();
  const v = album[code]||0;
  if(v<=0) return;
  album[code] = v-1;
  refreshSticker(code);
  updateStats();
  scheduleSave();
}
function refreshSticker(code) {
  const el = document.querySelector(`[data-code="${code}"]`);
  if(!el) return;
  const v = album[code]||0;
  el.className = 'sticker '+(v===0?'miss':v===1?'have':'rep');
  let cnt = el.querySelector('.s-cnt');
  if(v>=2){
    if(!cnt){ cnt=document.createElement('div'); cnt.className='s-cnt'; el.prepend(cnt); }
    cnt.textContent=v;
  } else if(cnt) cnt.remove();
}

function scheduleSave() {
  const ind = document.getElementById('saving');
  ind.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async()=>{
    try { await saveJSON(`album_${currentUser}.json`,album); }
    catch(e){ console.error('Error guardando:',e); }
    ind.classList.remove('show');
  },2000);
}

// ── NAVIGATION ─────────────────────────────────────────────────
function nav(d) {
  const nx = spreadIdx+d;
  if(nx<0||nx>=SPREADS.length) return;
  spreadIdx=nx; render();
}

function render() {
  const sp = SPREADS[spreadIdx];
  const wrap = document.getElementById('spread');
  wrap.innerHTML='';

  document.getElementById('btnPrev').disabled = spreadIdx===0;
  document.getElementById('btnNext').disabled = spreadIdx===SPREADS.length-1;

  const lNum = sp.L?.n;
  const rNum = sp.R?.n;
  document.getElementById('navInfo').textContent =
    sp.single ? `Página ${sp.L.n}` :
    lNum&&rNum ? `Páginas ${lNum} – ${rNum}` : `Página ${lNum||rNum}`;

  if(sp.single){
    wrap.appendChild(makePage(sp.L,'single'));
  } else {
    wrap.appendChild(sp.L ? makePage(sp.L,'left')  : blank('left'));
    wrap.appendChild(sp.R ? makePage(sp.R,'right') : blank('right'));
  }
}

function blank(side) {
  const d=document.createElement('div');
  d.className=`page ${side}`;
  return d;
}

function makePage(pg, side) {
  const d = document.createElement('div');
  d.className=`page ${side}`;

  if(pg.t==='info') {
    d.innerHTML=`
      <div class="info-inner">
        <div class="info-emblem">2026</div>
        <p>CONTENIDO INFORMATIVO</p>
        <p style="font-size:0.68rem;opacity:.45">Esta página del álbum<br>no contiene láminas</p>
      </div>
      <div class="page-num">— ${pg.n} —</div>`;
    return d;
  }

  // Título
  const tit = document.createElement('div');
  tit.className='page-title';
  if(pg.t==='fwc') tit.textContent='FWC — COPA DEL MUNDO';
  else tit.textContent=`${NOMBRES[pg.cod]||pg.cod} · Grupo ${pg.g}`;
  d.appendChild(tit);

  // Grid
  if(pg.t==='pais') {
    const grid = document.createElement('div');
    grid.className='grid-pais';
    for(const code of pg.s) grid.appendChild(makeSticker(code));
    d.appendChild(grid);
  } else {
    const row = document.createElement('div');
    row.className='grid-fwc';
    for(const code of pg.s) {
      const s = makeSticker(code);
      s.style.flex='1';
      s.style.maxWidth='90px';
      row.appendChild(s);
    }
    d.appendChild(row);
  }

  const pn=document.createElement('div');
  pn.className='page-num';
  pn.textContent=`— ${pg.n} —`;
  d.appendChild(pn);
  return d;
}

function makeSticker(code) {
  const v = album[code]||0;
  const el = document.createElement('div');
  el.className='sticker '+(v===0?'miss':v===1?'have':'rep');
  el.dataset.code=code;
  el.title=code;

  if(v>=2){
    const c=document.createElement('div');
    c.className='s-cnt'; c.textContent=v;
    el.appendChild(c);
  }
  const lbl=document.createElement('div');
  lbl.className='s-code'; lbl.textContent=code;
  el.appendChild(lbl);

  el.addEventListener('click', e=>clickSticker(code,e));
  el.addEventListener('contextmenu', e=>rightClick(code,e));
  return el;
}

// ── STATS ──────────────────────────────────────────────────────
function updateStats() {
  const total = ALL_CODES.length;
  let have=0, reps=0;
  for(const c of ALL_CODES){ const v=album[c]||0; if(v>=1)have++; if(v>=2)reps++; }
  document.getElementById('hstats').innerHTML=`
    <span><span class="dot g"></span>${have}/${total} láminas</span>
    <span><span class="dot y"></span>${reps} repetidas</span>`;
}

// ── MODAL ──────────────────────────────────────────────────────
function openModal() {
  renderModal();
  document.getElementById('overlay').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
}
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeModal(); });

function renderModal() {
  const reps = ALL_CODES.filter(c=>(album[c]||0)>=2);
  const chips = document.getElementById('chips');
  if(reps.length===0){
    chips.innerHTML='<div class="empty">No tienes láminas repetidas</div>';
  } else {
    chips.innerHTML=reps.map(c=>`<div class="chip">${c} <span class="x">×${album[c]}</span></div>`).join('');
  }
  // export
  const list=[];
  for(const c of ALL_CODES){ const v=album[c]||0; for(let i=0;i<v-1;i++) list.push(c); }
  const box=document.getElementById('exportbox');
  box.textContent = list.length ? list.join(', ') : 'Sin repetidas para exportar';
}

function buscar() {
  const q=document.getElementById('sinput').value.trim().toUpperCase();
  const el=document.getElementById('search-result');
  if(!q){el.textContent='';return;}
  if(!ALL_CODES.includes(q)){
    el.textContent=`❌ "${q}" no existe en el álbum`;
    el.style.color='#ff6b6b'; return;
  }
  const v=album[q]||0;
  if(v===0){el.textContent=`⬜ ${q}: No la tienes`; el.style.color='rgba(255,255,255,0.5)';}
  else if(v===1){el.textContent=`🟩 ${q}: La tienes (1 unidad)`; el.style.color='#2ecc71';}
  else{el.textContent=`🟨 ${q}: Tienes ${v} unidades (${v-1} de sobra)`; el.style.color='#f1c40f';}
}

function copiar() {
  const txt=document.getElementById('exportbox').textContent;
  if(txt==='Sin repetidas para exportar') return;
  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.querySelector('.copy-row .btn-sm');
    const orig=b.textContent;
    b.textContent='✓ Copiado!';
    setTimeout(()=>b.textContent=orig,2000);
  });
}

// Teclado
document.addEventListener('keydown',e=>{
  if(document.getElementById('overlay').classList.contains('hidden')){
    if(e.key==='ArrowRight') nav(1);
    if(e.key==='ArrowLeft')  nav(-1);
  }
});
</script>
</body>
</html>
