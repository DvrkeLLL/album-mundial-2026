<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuración — Álbum Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0a0a1a 0%, #001a5c 40%, #8b0000 70%, #0a0a1a 100%);
    padding: 2rem;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(circle at 20% 30%, rgba(0,61,165,0.35) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(200,16,46,0.35) 0%, transparent 50%);
    pointer-events:none;
  }
  .card {
    position:relative; z-index:1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 2.5rem;
    width:100%; max-width:460px;
    text-align:center;
    color:#fff;
  }
  .icon { font-size:2.8rem; margin-bottom:1rem; }
  h1 {
    font-family:'Bebas Neue',sans-serif;
    font-size:2rem; letter-spacing:3px;
    color:#F5A623; margin-bottom:0.4rem;
  }
  p.sub { color:rgba(255,255,255,0.55); font-size:0.88rem; margin-bottom:1.8rem; line-height:1.5; }
  label { display:block; text-align:left; font-size:0.75rem; letter-spacing:1px; color:rgba(255,255,255,0.45); margin-bottom:0.3rem; text-transform:uppercase; }
  input {
    width:100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius:10px; padding:0.8rem 1rem;
    color:#fff; font-family:'Barlow',sans-serif; font-size:0.95rem;
    margin-bottom:1rem; outline:none;
  }
  input:focus { border-color:#F5A623; }
  input::placeholder { color:rgba(255,255,255,0.3); }
  .btn {
    width:100%; margin-top:0.5rem;
    background: linear-gradient(135deg,#C8102E,#8b0000);
    border:none; border-radius:10px; padding:0.9rem;
    color:#fff; font-family:'Bebas Neue',sans-serif;
    font-size:1.1rem; letter-spacing:2px; cursor:pointer; transition:all 0.2s;
  }
  .btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(200,16,46,0.4); }
  .note { font-size:0.75rem; color:rgba(255,255,255,0.35); margin-top:1.2rem; line-height:1.5; }
  .err { color:#ff6b6b; font-size:0.82rem; margin-bottom:0.5rem; min-height:1.2em; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔑</div>
  <h1>CONFIGURACIÓN</h1>
  <p class="sub">Primera vez en este dispositivo. Ingresa tu token de GitHub para que el álbum pueda guardar tus datos. Solo se hace una vez acá.</p>

  <label>Token de GitHub</label>
  <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off">

  <label>Usuario de GitHub</label>
  <input type="text" id="owner" placeholder="DvrkeLLL" autocomplete="off">

  <label>Nombre del repositorio</label>
  <input type="text" id="repo" placeholder="album-mundial-2026" autocomplete="off">

  <div class="err" id="err"></div>
  <button class="btn" onclick="guardar()">GUARDAR Y CONTINUAR →</button>
  <p class="note">El token se guarda solo en este navegador y nunca se sube a internet. En otro dispositivo deberás repetir este paso.</p>
</div>
<script>
  window.onload = () => {
    if (localStorage.getItem('gh_token') && localStorage.getItem('gh_owner') && localStorage.getItem('gh_repo')) {
      window.location.href = 'login.html';
    }
    document.getElementById('owner').value = 'DvrkeLLL';
    document.getElementById('repo').value = 'album-mundial-2026';
  };

  function guardar() {
    const token = document.getElementById('token').value.trim();
    const owner = document.getElementById('owner').value.trim();
    const repo  = document.getElementById('repo').value.trim();
    const err   = document.getElementById('err');
    if (!token) { err.textContent = 'Pega tu token de GitHub'; return; }
    if (!token.startsWith('ghp_') && !token.startsWith('github_pat_')) {
      err.textContent = 'El token debe empezar con ghp_ o github_pat_'; return;
    }
    if (!owner || !repo) { err.textContent = 'Completa todos los campos'; return; }
    localStorage.setItem('gh_token', token);
    localStorage.setItem('gh_owner', owner);
    localStorage.setItem('gh_repo', repo);
    window.location.href = 'login.html';
  }
</script>
</body>
</html>
